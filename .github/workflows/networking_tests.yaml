name: Networking Tests

# Fork note: this lane needs upstream infrastructure/secrets Apocrypha does not have
# (self-hosted runner / NEXUS_API_KEY / ES_* signing / NUGET_KEY). Manual-only until the
# fork stands up its own equivalents.
on:
  workflow_dispatch:
jobs:
  build:
    
    name: Test Networking
    runs-on: [self-hosted]
    
    environment: test
    
    env:
      NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: "recursive"
          lfs: true

      - name: Print debug info
        run: dotnet --info

      - name: Install dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Tests
        run: dotnet test --no-build --logger "GitHubActions" --filter "RequiresNetworking=True" --blame-hang-timeout 20m



