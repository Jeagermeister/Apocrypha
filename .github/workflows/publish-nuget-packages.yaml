name: Publish NuGet Packages

# Fork note: this lane needs upstream infrastructure/secrets Apocrypha does not have
# (self-hosted runner / NEXUS_API_KEY / ES_* signing / NUGET_KEY). Manual-only until the
# fork stands up its own equivalents.
on:
  workflow_dispatch:
jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - name: Get version
        id: get-version
        shell: pwsh
        run: |
          $version = [System.Version]::Parse("${{ github.ref_name }}".Replace('v', '')).ToString()
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo $version

  publish:
    needs: get-version
    uses: Nexus-Mods/NexusMods.App.Meta/.github/workflows/publish-nuget-packages.yaml@main
    with:
      version: ${{ needs.get-version.outputs.version }}
      use-nuget: true
      use-github: false
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_KEY }}
