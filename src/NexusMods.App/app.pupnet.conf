# PUPNET DEPLOY: 1.6.0

# PupNet automatically finds this file https://github.com/kuiperzone/PupNet-Deploy?tab=readme-ov-file#introduction-
# if it is in the current working directory.

# Reference Config: https://raw.githubusercontent.com/kuiperzone/PupNet-HelloWorld/main/HelloWorld.pupnet.conf

# APP PREAMBLE
AppBaseName = Apocrypha
AppFriendlyName = Apocrypha
AppId = io.github.jeagermeister.apocrypha
AppVersionRelease = 1.0.0[1]
AppShortSummary = Apocrypha — the Linux-first mod platform. Canon is just the beginning.
AppDescription = """"""
AppLicenseId =  GPL-3.0-only
AppLicenseFile =
AppChangeFile =

# PUBLISHER
PublisherName = The Apocrypha Project
PublisherCopyright = Copyright (C) 2026 Apocrypha contributors; portions (C) Black Tree Gaming Ltd (GPL-3.0)
PublisherLinkName = Home Page
PublisherLinkUrl = https://github.com/Jeagermeister/Apocrypha
PublisherEmail =

# DESKTOP INTEGRATION
DesktopNoDisplay = false
DesktopTerminal = false
DesktopFile = io.github.jeagermeister.apocrypha.desktop
MetaFile = io.github.jeagermeister.apocrypha.metainfo.xml
IconFiles = """
    icon.ico
    icon.svg
    apocrypha.16.png
    apocrypha.24.png
    apocrypha.32.png
    apocrypha.48.png
    apocrypha.64.png
    apocrypha.128.png
    apocrypha.256.png
    apocrypha.512.png
"""

# DOTNET PUBLISH
DotnetProjectPath =
DotnetPublishArgs = -p:Version=${APP_VERSION} --self-contained true -c Release -p:TieredCompilation=true -p:PublishReadyToRun=true -p:PublishSingleFile=true
DotnetPostPublish =
DotnetPostPublishOnWindows = sign.bat

# PACKAGE OUTPUT
PackageName = Apocrypha
OutputDirectory = Deploy/OUT

# APPIMAGE OPTIONS
AppImageArgs = --no-appstream
AppImageVersionOutput = false

# WINDOWS SETUP OPTIONS
SetupAdminInstall = false
SetupCommandPrompt =
SetupMinWindowsVersion = 10
SetupSignTool =
SetupSuffixOutput =
SetupVersionOutput = false
SetupUninstallScript = "uninstall.bat"







# unused but required
FlatpakPlatformRuntime = org.freedesktop.Platform
FlatpakPlatformSdk = org.freedesktop.Sdk
FlatpakPlatformVersion = 23.08
